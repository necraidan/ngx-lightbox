name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npx ng build ngx-lightbox
      - run: cp README.md dist/ngx-lightbox/
      - run: npm publish ./dist/ngx-lightbox
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
